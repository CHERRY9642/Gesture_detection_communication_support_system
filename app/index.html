<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Language to Sentence</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>👐 Sign Language to Sentence</h1>

    <!-- ================= MAIN LAYOUT ================= -->
    <div class="main-container">

        <!-- ========== LEFT SIDE : VIDEO + CANVAS ========== -->
        <div id="video-container">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas"></canvas>
        </div>

        <!-- ========== RIGHT SIDE : CONTROLS ========== -->
        <div class="controls">

            <!-- LIVE PREDICTION -->
            <h3>📹 Live Prediction</h3>
            <p><strong>Gesture:</strong> <span id="live-gesture"></span></p>
            <p><strong>Confidence:</strong> <span id="confidence"></span></p>

            <hr>

            <!-- CAPTURE STATUS -->
            <div id="capture-info">
                <p><strong>Status:</strong> <span id="capture-status">Ready to capture</span></p>
                <p><strong>Timer:</strong> <span id="timer">5</span></p>
            </div>

            <button id="capture">🎯 Start 5s Capture</button>
            <button id="clear">🗑️ Clear All</button>

            <hr>

            <!-- CAPTURED GESTURES -->
            <h3>🎯 Captured Gestures (<span id="gesture-count">0</span>)</h3>
            <p id="gestures">No gestures captured</p>
            <button id="form-sentence">✨ Form Sentence</button>

            <hr>

            <!-- SENTENCE OUTPUT -->
            <h3>💬 Output</h3>
            <p id="sentence">Click "Form Sentence" to generate</p>
            <button id="replay">🔊 Replay Audio</button>

        </div>
    </div>

    <!-- ================= REQUIRED LIBRARIES ================= -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic@0.5.1635989137/holistic.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-tflite@0.0.1-alpha.8/dist/tf-tflite.min.js"></script>

    <!-- ================= YOUR APP LOGIC ================= -->
    <script src="app.js"></script>

</body>
</html>
