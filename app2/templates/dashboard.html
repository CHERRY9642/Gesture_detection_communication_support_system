<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLR Business Dashboard</title>

    <!-- CSS -->
    <link rel="stylesheet" href="/static/css/style.css">

    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- MediaPipe & TFJS (MATCHING app/index.html EXACTLY) -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic@0.5.1635989137/holistic.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-tflite@0.0.1-alpha.8/dist/tf-tflite.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
</head>

<body>

    <!-- Main App -->
    <div class="app-container" id="main-app">

        <!-- Sidebar -->
        <nav class="sidebar glass-panel">
            <div class="logo">
                <i class="fas fa-hand-sparkles" style="font-size: 2rem; color: var(--primary);"></i>
                <h1>Gesture AI</h1>
            </div>
            <ul class="nav-links">
                <li class="active" onclick="window.location.href='/'"><i class="fas fa-video"></i> Live Inference</li>
                <li onclick="window.location.href='/analytics'"><i class="fas fa-chart-pie"></i> Analytics</li>
            </ul>

            <div style="margin-top: auto;">
                <a href="/logout" class="btn-secondary" style="width: 100%; text-align: center; display: block;"><i
                        class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main class="content">

            <!-- Global Top Navbar -->
            <header class="top-navbar glass-panel">
                <div class="current-page">
                    <h2 id="page-title" class="page-title">Live Inference</h2>
                    <span class="status-badge" id="sys-status">🟢 Online</span>
                </div>

                <div class="nav-actions">
                    <span style="font-weight: 500;">Hello, <span id="display-user" style="color: var(--primary);">{{
                            user }}</span></span>
                    <button id="theme-toggle" class="icon-btn" title="Toggle Theme">
                        <i class="fas fa-moon"></i>
                    </button>
                    <button class="mobile-menu-toggle icon-btn" onclick="toggleMobileMenu()" style="display: none;">
                        <i class="fas fa-bars"></i>
                    </button>
                </div>
            </header>

            <!-- Scrollable View -->
            <div class="main-view">

                <!-- TAB 1: Live Inference -->
                <section id="tab-live" class="tab-content active">
                    <div class="live-layout">
                        <!-- Left: Video -->
                        <div class="video-wrapper">
                            <video id="webcam" autoplay playsinline></video>
                            <canvas id="output_canvas"></canvas>
                        </div>

                        <!-- Right: Controls -->
                        <div class="control-panel glass-panel">
                            <h3>Prediction</h3>
                            <div class="kpi-card glass-panel" style="padding: 1rem; background: rgba(0,0,0,0.02);">
                                <h3>Current Gesture</h3>
                                <p id="gesture-result" style="color: var(--primary);">Waiting...</p>
                                <div style="display: flex; justify-content: space-between; margin-top: 5px;">
                                    <small>Confidence</small>
                                    <small id="conf-text">0%</small>
                                </div>
                                <div class="confidence-bar-bg">
                                    <div class="confidence-bar-fill" id="conf-bar"></div>
                                </div>
                            </div>

                            <hr>

                            <div id="capture-status-container"
                                style="margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;">
                                <span id="capture-status" class="status-badge"
                                    style="background: rgba(0,0,0,0.1); color: var(--text-main);">Ready</span>
                                <span id="timer-display"
                                    style="display:none; font-weight:bold; color: var(--accent); font-size: 1.2rem;"></span>
                            </div>

                            <div class="btn-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                                <button id="capture-btn" class="btn-primary" onclick="toggleCapture()">
                                    <i class="fas fa-bullseye"></i> Capture
                                </button>
                                <button class="btn-secondary" onclick="clearGestures()">
                                    <i class="fas fa-trash"></i> Clear
                                </button>
                            </div>

                            <div class="info-box">
                                <strong>Captured:</strong>
                                <div id="captured-gestures" style="margin-top:5px; color: var(--text-muted);">Empty
                                </div>
                            </div>

                            <button onclick="formSentence()" class="btn-primary" style="background: var(--secondary);">
                                <i class="fas fa-magic"></i> Form Sentence
                            </button>

                            <div class="output-box glass-panel">
                                <p id="final-sentence" style="font-size: 1.1rem; font-weight: 500;">...</p>
                            </div>
                            <button onclick="speakResult()" class="btn-secondary" style="width: 100%;">
                                <i class="fas fa-volume-up"></i> Speak
                            </button>
                        </div>
                    </div>
                </section>

                <!-- Analytics and Logs moved to /analytics page -->
            </div>
        </main>
    </div>

    <!-- Logic -->
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <script src="/static/js/ui.js"></script>
    <script src="/static/js/model.js"></script>
    <script>
        // Start camera on load
        window.addEventListener('load', () => {
            if (window.startCamera) window.startCamera();
        });

        function toggleMobileMenu() {
            document.querySelector('.sidebar').classList.toggle('open');
        }
    </script>
</body>

</html>
